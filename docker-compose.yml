name: greenvic-cdc-${CDC_ENV:-prd}

# =============================================================================
# CDC — docker-compose BASE.
#
# Este archivo contiene lo que existe en ambos ambientes (dev y prd):
#   - servicio `back` (cdc-back)
#   - servicio `front-ng` (cdc-front-ng)
#   - redes compartidas con platform
#
# Overrides especificos de cada ambiente viven en overlays:
#   - docker-compose.dev.yml  → NODE_ENV=development, bind mounts + hot-reload,
#                               OIDC URLs localhost, cookies relajadas.
#   - docker-compose.prd.yml  → NODE_ENV=production, IP LAN, cookies secure.
#
# El Makefile combina base + overlay correspondiente a CDC_ENV.
# No correr `docker compose -f docker-compose.yml` solo — siempre va con overlay.
#
# El router de platform (NGINX :81) alcanza este stack por los aliases
# `cdc-frontend` y `cdc-backend`.
# =============================================================================

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"
    compress: "true"

services:
  front-ng:
    build:
      context: ../cdc-front-ng
      dockerfile: Dockerfile
    image: cdc-front-ng:${CDC_ENV:-prd}
    container_name: cdc-front-${CDC_ENV:-prd}
    init: true
    restart: unless-stopped
    pull_policy: never
    read_only: true
    tmpfs:
      - /var/cache/nginx:uid=101,gid=101
      - /var/run:uid=101,gid=101
      - /tmp
    security_opt:
      - no-new-privileges:true
    logging:
      <<: *default-logging
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    expose:
      - "3000"
    networks:
      default:
        aliases:
          - cdc-frontend
    healthcheck:
      test:
        - "CMD-SHELL"
        - "wget -q -O - http://127.0.0.1:3000/healthz > /dev/null 2>&1 || exit 1"
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

  back:
    build:
      context: ../cdc-back
      dockerfile: Dockerfile
      target: runtime
    image: cdc-back:${CDC_ENV:-prd}
    container_name: cdc-back-${CDC_ENV:-prd}
    init: true
    restart: unless-stopped
    pull_policy: never
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    logging:
      <<: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    env_file:
      - ./.env
    environment:
      PORT: "${PORT:-4000}"
      HOSTNAME: "0.0.0.0"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "4000"
    networks:
      default:
        aliases:
          - cdc-backend
      identity:
      cache:
    healthcheck:
      test:
        - "CMD-SHELL"
        - "node -e \"fetch('http://127.0.0.1:4000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

networks:
  default:
    external: true
    name: greenvic-cdc-${CDC_ENV:-prd}_default
  identity:
    external: true
    name: platform_identity
  cache:
    external: true
    name: platform_cache
